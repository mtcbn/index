<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTC-PLANNER PORTAL</title>
  <link rel="icon" href="NONE" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    body {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }

    .portal-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      font-size: 50px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    p {
      font-size: 14px;
      color: #e2e8f0;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 20px;
      background: #ffffff;
      color: #1e3c72;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      transition: all 0.2s ease;
    }

    .btn-launch:hover {
      background: #f8fafc;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    }

    .btn-launch:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 30px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <div class="portal-card">
    <div class="icon-wrapper">🛠️</div>
    <h1>MTC-Planner Portal</h1>
    <p>Sistem Informasi Manajemen & Perencanaan Pemeliharaan (Maintenance Planner)</p>
    
    <!-- Link langsung diarahkan untuk membuka di tab baru (_blank) -->
    <a href="https://script.google.com/macros/s/AKfycbytmExZ2ep9OTCz7lIyF3CeKvKqN5bjqOdHfLdrAs_5VGWHpHzhK3S22X75CV5NxE59Ig/exec" 
       target="_blank" 
       class="btn-launch">
      Masuk ke Aplikasi 🚀
    </a>

    <div class="footer">
      Development by: Maintenance Department
    </div>
  </div>

</body>
</html>
